dimensions:
  core:
    - id: plot
      name: 情节结构
      weight: 0.20
      sub_aspects: [起承转合完整度, 节奏感, 冲突设置, 伏笔回收, 高潮段落冲击力]
      rubric:
        "9-10": 情节环环相扣，伏笔全部回收且令人惊叹，节奏无明显拖沓，高潮段有强烈冲击
        "7-8": 主线清晰完整，有1-2处精彩伏笔，节奏基本流畅，有明确高潮
        "5-6": 情节能推进但有松散段落，伏笔部分回收，节奏偶有拖沓
        "3-4": 情节断裂或大量注水，伏笔遗忘严重，缺乏明确高潮
        "1-2": 情节混乱无法跟踪，严重前后矛盾

    - id: character
      name: 人物塑造
      weight: 0.20
      sub_aspects: [主角立体度, 配角辨识度, 成长弧光, 行为动机一致性, 对话个性化]
      rubric:
        "9-10": 至少2个角色有完整心理弧光，行为动机可追溯，对话有鲜明个人特征
        "7-8": 主角有明确成长线，配角各有特色，行为基本合理
        "5-6": 主角有基本性格但不够立体，配角存在脸谱化，动机偶有不合理
        "3-4": 人物扁平，配角无辨识度，行为为剧情服务而非人物驱动
        "1-2": 人物无法区分，行为随机，无任何成长

    - id: writing
      name: 文笔质量
      weight: 0.15
      sub_aspects: [语言风格, 修辞水平, 叙述流畅度, 废话率, 描写密度]
      rubric:
        "9-10": 语言有辨识度和美感，修辞精准不堆砌，叙述如行云流水
        "7-8": 文笔流畅，用词准确，偶有出彩句子，无明显废话
        "5-6": 文笔合格但平淡，有少量口水话或重复描写
        "3-4": 用词单调或堆砌，大量废话注水，叙述生硬
        "1-2": 语病频出，基本表达能力欠缺

    - id: worldbuilding
      name: 世界观构建
      weight: 0.15
      sub_aspects: [设定完整性, 内部逻辑自洽, 细节丰富度, 设定与情节的融合度]
      rubric:
        "9-10": 设定体系完整且自洽，细节丰富但不过度说明，设定自然融入情节
        "7-8": 核心设定清晰合理，有一定独创性，偶有小矛盾
        "5-6": 设定基本能支撑故事但缺乏深度，有借鉴痕迹
        "3-4": 设定粗糙或大量借鉴，逻辑漏洞多，硬伤明显
        "1-2": 设定混乱矛盾，无法构建可信世界

    - id: theme
      name: 主题深度
      weight: 0.15
      sub_aspects: [核心思想, 价值表达, 是否有余味, 主题与情节的有机结合]
      rubric:
        "9-10": 主题深刻且有独特视角，不说教，读后有持久思考
        "7-8": 有明确主题表达，通过情节自然呈现，有一定思考空间
        "5-6": 主题存在但较浅或直白，偶有说教感
        "3-4": 主题模糊或流于口号，与情节脱节
        "1-2": 无法提炼出主题，纯粹流水账

  auxiliary:
    - id: dialogue
      name: 对话质量
      weight: 0.05
      sub_aspects: [符合人设, 信息密度, 口语化程度, 推动情节能力]
      rubric:
        "9-10": 对话即人物名片，每句都有信息量或情感推动
        "7-8": 对话自然，基本符合人设，能推动情节
        "5-6": 对话功能性完成但缺乏个性
        "3-4": 对话生硬或千人一面
        "1-2": 对话不像人话

    - id: emotion
      name: 情感感染力
      weight: 0.05
      sub_aspects: [高潮段冲击力, 情绪调动能力, 情感真实度]
      rubric:
        "9-10": 多处让人落泪/热血沸腾/脊背发凉，情感共鸣强烈
        "7-8": 有1-2处明确的情感高潮，能引起共鸣
        "5-6": 情感表达存在但力度不足，未能深入触动
        "3-4": 情感苍白或刻意煽情
        "1-2": 完全无法引起情感反应

    - id: innovation
      name: 创新性
      weight: 0.05
      sub_aspects: [题材新颖度, 叙事手法, 是否有套路化问题]
      rubric:
        "9-10": 题材或手法有开创性，让人眼前一亮
        "7-8": 在类型框架内有独特切入点或新鲜元素
        "5-6": 基本符合类型预期，无明显创新也无严重套路
        "3-4": 严重套路化，情节走向可预测
        "1-2": 完全是模板化写作

prompt_version: "v1"
