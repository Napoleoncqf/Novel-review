dimensions:
  core:
    - id: plot
      name: 情节结构
      eval_mode: scorable
      weight: 0.20
      sub_aspects: [起承转合完整度, 节奏感, 冲突设置, 伏笔回收, 高潮段落冲击力]
      rubric:
        "9-10": 情节环环相扣，伏笔全部回收且令人惊叹，节奏无明显拖沓，高潮段有强烈冲击
        "7-8": 主线清晰完整，有1-2处精彩伏笔，节奏基本流畅，有明确高潮
        "5-6": 情节能推进但有松散段落，伏笔部分回收，节奏偶有拖沓
        "3-4": 情节断裂或大量注水，伏笔遗忘严重，缺乏明确高潮
        "1-2": 情节混乱无法跟踪，严重前后矛盾

    - id: character
      name: 人物塑造
      eval_mode: scorable
      weight: 0.20
      sub_aspects: [主角立体度, 配角辨识度, 成长弧光, 行为动机一致性, 对话个性化]
      rubric:
        "9-10": 至少2个角色有完整心理弧光，行为动机可追溯，对话有鲜明个人特征
        "7-8": 主角有明确成长线，配角各有特色，行为基本合理
        "5-6": 主角有基本性格但不够立体，配角存在脸谱化，动机偶有不合理
        "3-4": 人物扁平，配角无辨识度，行为为剧情服务而非人物驱动
        "1-2": 人物无法区分，行为随机，无任何成长

    - id: writing
      name: 文笔质量
      eval_mode: qualitative
      sub_aspects: [语言风格, 修辞水平, 叙述流畅度, 废话率, 描写密度]
      style_tags: [白描克制型, 辞藻华丽型, 口语化, 意识流, 古典雅致, 简洁利落, 诗化抒情, 幽默戏谑]
      technique_hints: [重复, 留白, 对比, 象征, 通感, 反讽, 白描, 蒙太奇, 意识流, 互文]

    - id: worldbuilding
      name: 世界观构建
      eval_mode: scorable
      weight: 0.15
      sub_aspects: [设定完整性, 内部逻辑自洽, 细节丰富度, 设定与情节的融合度]
      rubric:
        "9-10": 设定体系完整且自洽，细节丰富但不过度说明，设定自然融入情节
        "7-8": 核心设定清晰合理，有一定独创性，偶有小矛盾
        "5-6": 设定基本能支撑故事但缺乏深度，有借鉴痕迹
        "3-4": 设定粗糙或大量借鉴，逻辑漏洞多，硬伤明显
        "1-2": 设定混乱矛盾，无法构建可信世界

    - id: theme
      name: 主题深度
      eval_mode: qualitative
      sub_aspects: [核心思想, 价值表达, 是否有余味, 主题与情节的有机结合]
      style_tags: [人性探索, 社会批判, 成长蜕变, 命运抗争, 存在主义, 爱与救赎, 权力博弈, 日常哲思]
      technique_hints: [隐喻, 反讽, 多义性, 开放结局, 镜像对照, 以小见大, 寓言化]

  auxiliary:
    - id: dialogue
      name: 对话质量
      eval_mode: scorable
      weight: 0.05
      sub_aspects: [符合人设, 信息密度, 口语化程度, 推动情节能力]
      rubric:
        "9-10": 对话即人物名片，每句都有信息量或情感推动
        "7-8": 对话自然，基本符合人设，能推动情节
        "5-6": 对话功能性完成但缺乏个性
        "3-4": 对话生硬或千人一面
        "1-2": 对话不像人话

    - id: emotion
      name: 情感感染力
      eval_mode: qualitative
      sub_aspects: [高潮段冲击力, 情绪调动能力, 情感真实度]
      style_tags: [克制内敛, 浓烈外放, 暗流涌动, 温情细腻, 冷峻疏离, 热血激昂, 黑色幽默]
      technique_hints: [重复渲染, 反衬, 留白, 细节蓄力, 节奏骤变, 视角切换, 通感]

    - id: innovation
      name: 创新性
      eval_mode: qualitative
      sub_aspects: [题材新颖度, 叙事手法, 是否有套路化问题]
      style_tags: [类型颠覆, 叙事实验, 跨类型融合, 视角创新, 结构创新, 类型内微创新, 传统守正]
      technique_hints: [非线性叙事, 不可靠叙述者, 多线交织, 元叙事, 类型解构, 反套路]

prompt_version: "v2"
